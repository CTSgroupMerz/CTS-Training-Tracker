<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Generate Icons</title></head>
<body>
<p>กด Generate แล้ว Download ทั้ง 2 ไฟล์ ไปวางใน icons/ folder</p>
<button onclick="gen(192,'icon-192.png')">Download icon-192.png</button>
<button onclick="gen(512,'icon-512.png')">Download icon-512.png</button>
<canvas id="c" style="border:1px solid #ccc;margin-top:12px"></canvas>
<script>
function draw(size) {
  var c = document.getElementById('c');
  c.width = size; c.height = size;
  var ctx = c.getContext('2d');
  var r = size * 0.1875; // corner radius

  // Background
  ctx.fillStyle = '#111110';
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // Medical cross
  ctx.fillStyle = '#4ADE80';
  var cw = size * 0.1875; // cross arm width
  var cx = size / 2;
  var cy = size / 2;
  var len = size * 0.469;
  ctx.beginPath();
  ctx.roundRect(cx - cw/2, cy - len/2, cw, len, cw*0.19);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(cx - len/2, cy - cw/2, len, cw, cw*0.19);
  ctx.fill();

  // Data lines
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath();
  ctx.roundRect(size*0.297, size*0.719, size*0.406, size*0.014, size*0.007);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.11)';
  ctx.beginPath();
  ctx.roundRect(size*0.297, size*0.745, size*0.297, size*0.014, size*0.007);
  ctx.fill();
}

function gen(size, name) {
  draw(size);
  var c = document.getElementById('c');
  var a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = name;
  a.click();
}

draw(192);
</script>
</body>
</html>
